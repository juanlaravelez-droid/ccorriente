<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Vital para móviles: evita el zoom automático y ajusta al ancho de pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Eléctrica Pro</title>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background: var(--card);
            width: 100%;
            max-width: 450px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            -webkit-appearance: none; /* Quita estilos por defecto en iOS */
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            /* Efecto de pulsación para móviles */
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.96);
        }

        #result-card {
            margin-top: 24px;
            padding: 20px;
            background-color: #eff6ff;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed var(--primary);
        }

        .result-value {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .unit { font-size: 1rem; color: #64748b; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Calculadora de Amperaje (3φ)</h1>
    
    <div class="input-group">
        <label>Potencia (P) Watts</label>
        <input type="number" id="p" placeholder="Ej: 5000" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Voltaje (V) Voltios</label>
        <input type="number" id="v" placeholder="Ej: 220" inputmode="decimal">
    </div>

    <button onclick="calcular()">CALCULAR AHORA</button>

    <div id="result-card">
        <span class="unit">Corriente requerida (+25%):</span>
        <span id="res" class="result-value">0.00</span>
        <span class="unit">Amperios</span>
    </div>
</div>

<script>
    function calcular() {
        const p = parseFloat(document.getElementById('p').value);
        const v = parseFloat(document.getElementById('v').value);

        if (p > 0 && v > 0) {
            // Operación: ((P / V) / 1.73) * 1.25
            const total = ((p / v) / 1.73) * 1.25;
            document.getElementById('res').innerText = total.toFixed(2);
        } else {
            alert("Ingresa valores válidos");
        }
    }
</script>

</body>
</html>
